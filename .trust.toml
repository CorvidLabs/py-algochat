schema_version = 1
profile = "standard"

[lifecycle]
command = ["fledge", "lanes", "run", "verify"]

[contract]
enabled = true
require_coverage = 0
skip_reason = "No committed SpecSync coverage threshold exists; SDD lifecycle enforcement remains blocking"

[risk]
threshold = "block"

[provenance]
mode = "soft"
policy = ".attest.json"
skip_reason = ""

[atlas]
enabled = false
skip_reason = "No Atlas publication workflow is configured for this repository"
