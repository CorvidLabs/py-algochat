schema_version = 1
profile = "standard"

[lifecycle]
command = ["specsync", "change", "check", "--strict", "--require-coverage", "100"]

[contract]
enabled = true
require_coverage = 100
skip_reason = ""

[risk]
threshold = "block"

[provenance]
mode = "soft"
policy = ".attest.json"
skip_reason = ""

[atlas]
enabled = false
skip_reason = "No Atlas publication workflow is configured for this repository"
