name: trust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install verification dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff
      - name: SpecSync lifecycle gate
        uses: CorvidLabs/spec-sync@a89d827e93fa0bc9e6168447e66a0ad30fa92e65 # v5.1.1
        with:
          version: "5.1.1"
          root: .
          strict: "true"
          require-coverage: "100"
          lifecycle-enforce: "true"
      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@a239f78658e5ad0f12fa230f494890e40c6e4d7b # v1.1.1
