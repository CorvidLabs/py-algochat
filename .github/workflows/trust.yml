name: trust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install verification dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff
      - name: SpecSync lifecycle gate
        uses: CorvidLabs/spec-sync@59bbfa766c6cce01ab815ab47db195b0629cc014 # v5.0.1
        with:
          version: "5.0.1"
          root: .
          strict: "true"
          require-coverage: "100"
          lifecycle-enforce: "true"
      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@9d32b5786d2e9e4d39fc581c0091c721ee3d4226 # v1.0.0
