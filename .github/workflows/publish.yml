name: Publish

# Publishes py-algochat to PyPI when a version tag is pushed.
# Uses PyPI Trusted Publishing (OIDC) via pypa/gh-action-pypi-publish.
# No PYPI_TOKEN secret is required: the id-token permission lets GitHub mint a
# short-lived OIDC token that PyPI exchanges for upload credentials.
#
# Prerequisites (one-time, on PyPI):
#   Configure a Trusted Publisher for project "py-algochat" with:
#     Owner: CorvidLabs
#     Repository: py-algochat
#     Workflow: publish.yml
#     Environment: pypi

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/py-algochat/
    permissions:
      id-token: write  # Required for OIDC Trusted Publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
